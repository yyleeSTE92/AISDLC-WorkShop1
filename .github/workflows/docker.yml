name: Build and push image

# Fires when the `bundle` submodule pointer changes on main (i.e. when
# build-bundle.mjs pins a new release) or when this workflow file itself changes.
# Does NOT fire for source-layer pushes (backend/frontend/cli) — those branches
# don't contain this workflow file, and the path filter only matches the submodule
# pointer file, not the contents inside bundle/.

on:
  push:
    branches: [main]
    paths:
      - bundle                              # submodule pointer (160000 tree entry)
      - .github/workflows/docker.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write                           # push to ghcr.io

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout with recursive submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive             # bundle/ must be populated for the build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags and labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          # metadata-action lowercases the image name automatically
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./bundle
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
